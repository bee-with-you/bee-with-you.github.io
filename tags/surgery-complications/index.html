    var arrPosts = [{"link":"https://bee-with-you.github.io/posts/what-is-hbot/","plain":" ⚠️ This log is a personal documentation and not medical advice. Always consult your child\u0026rsquo;s surgeon or pediatric urologist for individualized care.\nWhat is HBOT? HBOT stands for hyperbaric oxygen therapy. It is a treatment in which a person breathes oxygen inside a special chamber with air pressure that is higher than normal.\nBecause the pressure is higher, the lungs can take in more oxygen than they normally would. That extra oxygen then travels through the blood to body tissues. Doctors may use HBOT to help certain wounds or damaged tissues heal.\nIn simple words, HBOT is a way to deliver more oxygen to tissue that may be struggling to heal well.\nHow is it related to hypospadias surgery? In hypospadias care, some surgeons may use HBOT as an extra support treatment in selected cases, especially when healing may be harder than usual. This may include:\nredo or previously failed repairs complex cases with known wound-healing concerns situations involving grafts or tissue that may have weaker blood supply The reason is that oxygen can support tissue healing. Research reviews suggest HBOT may lower graft failure and some complications in complicated hypospadias cases, but the evidence is still limited and not strong enough to say every child should have it.\nSo the practical takeaway is this: the decision depends on the surgeon, the surgical plan, and the child’s specific situation. It is reasonable to discuss it with the surgeon and seek a second opinion when needed.\nCommon questions Below is a list of questions that may help with discussions with your surgeon and HBOT center. The answers below are based mainly on published sources, with a few notes from our own experience clearly marked as personal.\n1 - Is it necessary to do HBOT for the hypospadias surgery? Not always. For many children, hypospadias surgery is done without HBOT. It is usually considered only in selected cases where the surgeon thinks tissue healing may need extra support.\n2 - Is it necessary to do the pre-surgery HBOT? Some doctors may recommend HBOT before surgery in complex or redo cases, while others may not use it at all. Pre-surgery HBOT is a case-by-case decision.\nOur personal reasons for doing pre-surgery HBOT were:\nIt helped our child get used to HBOT before surgery, which made the post-surgery sessions easier. Our insurance covered one session per day before surgery, so it was not a major extra financial burden for us. 3 - How many sessions of post-surgery HBOT are recommended? There is no single number that fits everyone. Mayo Clinic notes that the number of sessions depends on the medical condition, and some conditions may need many sessions.\nFor our own case, we did about 15 to 25 sessions, with each session lasting about 90 minutes. The exact number depended on the stage of surgery, how long we stayed near the HBOT facility, and how many sessions insurance approved.\nWe also did two sessions a day for the first three days after surgery to better help reducing the swellingness and speeding up the healing. This was our personal experience, not a general rule.\n4 - What are the possible side effects when doing HBOT? HBOT is usually well tolerated, but side effects can happen. The more common ones include:\near pressure, ear pain, or popping tiredness or lightheadedness after treatment sinus discomfort Less common but more serious risks include:\ntemporary vision changes middle ear injury lung injury oxygen toxicity, which can rarely cause seizures Because high-oxygen environments also carry a fire risk, HBOT should be done in a properly trained medical setting.\n5 - Can I go with the child for the HBOT if they are too young? It depends on the type of chamber and the center’s rules.\nThere are two common chamber types:\nMonoplace chamber: usually one patient lies in a clear chamber and breathes oxygen inside the pressurized chamber. Multiplace chamber: several people are treated in a larger chamber, and patients usually receive oxygen through a hood or mask. Ask the HBOT center directly what they allow for young children. Rules about whether a parent can accompany the child, stay nearby, or communicate during treatment vary by facility and chamber setup.\nFigure 1. Monoplace HBOT chamber Figure 2. Multiplace HBOT chamber 6 - What are the clothes or other wearing requirements for HBOT? Follow the center\u0026rsquo;s instructions exactly. Many centers use a 100% cotton clothes for safety. Patients may also be asked to remove jewelry, hearing aids, contact lenses, medication patches, and glasses.\n7 - Does HBOT hurt? Usually not. The most common discomfort is pressure in the ears, similar to what some people feel on an airplane or when going up a mountain.\n8 - How to entertain during HBOT? This depends on the chamber type and the center\u0026rsquo;s safety rules.\nIn general, personal electronic devices are not allowed inside the monoplace chamber. Some centers let patients watch TV or listen to audio through the chamber system. For young children, ask in advance what comfort items are allowed and how the staff usually helps children stay calm.\n9 - What is the cost of HBOT? Coverage and cost vary a lot.\nFor approved indications, Medicare, Medi-Cal, and many insurance plans may cover HBOT. For hypospadias-related use, coverage may depend on the diagnosis submitted, the insurer, and the facility. It is best to ask both the HBOT center and your insurance company about pre-authorization, copays, and out-of-pocket estimates.\n10 - What needs to be prepared for HBOT? Useful things to prepare include:\nFinancial preparation: check with your insurance company to see whether treatment is covered and whether pre-authorization is needed. Clothing: ask the center what you or your child should wear. Many centers provide approved clothing. Comfort planning for a young child: ask what toys, books, or other non-electronic comfort items are allowed. Scheduling: sessions are often repeated over many days, so transportation, childcare for siblings, and time off work may also need planning. Reference Mayo Clinic.\nHyperbaric oxygen therapy\nhttps://www.mayoclinic.org/tests-procedures/hyperbaric-oxygen-therapy/about/pac-20394380 Johns Hopkins Medicine.\nComplications of Hyperbaric Oxygen Treatment\nhttps://www.hopkinsmedicine.org/health/treatment-tests-and-therapies/complications-of-hyperbaric-oxygen-treatment Undersea \u0026amp; Hyperbaric Medical Society (UHMS).\nCompromised Grafts and Flaps\nhttps://www.uhms.org/12-compromised-grafts-and-flaps.html Chua ME, Kim JJK, Ming JM, et al.\nThe utilization of hyperbaric oxygenation therapy in hypospadias repair: a systematic review and meta-analysis.\nInternational Urology and Nephrology. 2022.\nhttps://pubmed.ncbi.nlm.nih.gov/35024997/ Anand S, Krishnan N, Bajpai M.\nUtility and safety of hyperbaric oxygen therapy as a rescue treatment in complicated cases of hypospadias: A systematic review and meta-analysis.\nJournal of Pediatric Urology. 2022.\nhttps://pubmed.ncbi.nlm.nih.gov/34696963/ Memorial Hermann.\nPediatric Hyperbaric Chamber\nhttps://memorialhermann.org/services/treatments/pediatric-hyperbaric-chamber Miller Children’s \u0026amp; Women’s Hospital.\nHyperbaric Oxygen Program\nhttps://www.millerchildrens.memorialcare.org/specialties/hyperbaric-oxygen-program U.S. Food and Drug Administration (FDA).\nFollow Instructions for Safe Use of Hyperbaric Oxygen Therapy Devices\nhttps://www.fda.gov/medical-devices/letters-health-care-providers/follow-instructions-safe-use-hyperbaric-oxygen-therapy-devices-letter-health-care-providers UCSF Health Hyde Hospital.\nHyperbaric Oxygen Therapy FAQ\nhttps://sfcommunityhospitals.ucsfhealth.org/saint-francis/services/hyperbaric-oxygen-therapy/hyperbaric-oxygen-therapy-faq Hyperbaric Healing Treatment Center.\nMultiplace and Monoplace hyperbaric chambers: What\u0026rsquo;s the difference?\nhttps://hyperbaricsorlando.com/multiplace-and-monoplace-hyperbaric-chambers/ ","pubDate":"2026-02-15","title":"What is HBOT?"},{"link":"https://bee-with-you.github.io/posts/what-is-hypospadias/","plain":" ⚠️ This log is a personal documentation and not medical advice. Always consult your child\u0026rsquo;s surgeon or pediatric urologist for individualized care. As patients or parents of patients, the emotional impact of a hypospadias diagnosis can be significant. I remember feeling shocked, confused, guilty, and depressed for years. I wished for information that was factual and calm—something that could help soften the emotions that come with hearing unfamiliar medical terms about the child. This is my attempt to share what I’ve learned, grounded in reliable medical sources, for parents who may be standing where we once stood.\nWhat is hypospadias? Hypospadias is a congenital condition, meaning it is present at birth, in which the opening of the urethra (the meatus) is located on the underside of the penis rather than at the tip.\nIt is one of the most common congenital conditions in boys, occurring in approximately 1 in 200–300 male births, although it is rarely discussed publicly. The location of the urethral opening can vary, and in clinical practice the final classification is often confirmed after correction of any associated chordee:\nDistal (mild): near the tip of the penis Midshaft: along the penile shaft Proximal (more severe): near the scrotum or perineum Hypospadias may also be associated with:\nChordee, a downward curvature of the penis A hooded foreskin Hypospadias does NOT affect a child’s intelligence, growth, or overall health. Many boys with hypospadias are otherwise completely healthy.\nWhat causes hypospadias? Hypospadias develops during early fetal development, typically between 8 and 14 weeks of pregnancy, when the urethra and external genitalia are forming. Medical research shows that hypospadias has a multifactorial cause, meaning several factors may be involved rather than a single explanation. These may include:\nHormonal factors, particularly those involving androgen signaling Genetic influences, as hypospadias occurs more often in some families Environmental factors, which are still being studied and not conclusively proven What doctors emphasize—and what many parents need to hear—is that there is no evidence that anything a parent did or did not do caused hypospadias. Feelings of guilt are common, but they are not supported by medical evidence.\nWhen is surgery recommended? Surgery for hypospadias may not be required in every case. The decision depends on the severity of the condition and is made in consultation with multiple pediatric urologists, often after careful discussion and second opinions.\nSurgical repair may be recommended when hypospadias is expected to cause:\nDifficulty directing urine Significant penile curvature (chordee) A urethral opening far from the tip of the penis Potential reproductive or sexual function concerns later in life Psychosocial concerns as the child grows When surgery is recommended, it is most often performed between 6 and 18 months of age, a timeframe supported by pediatric surgical and anesthesia research. Long-term studies show high success rates and low complication risks when surgery is performed by experienced pediatric urologists, making surgeon experience an important consideration once a surgical decision is made.\nAs a parent, it helped me to know that:\nSurgery is planned and elective, not an emergency Decisions are individualized—there is no single right path Asking questions and taking time to decide are encouraged Reference Cleveland Clinic.\nHypospadias: Causes, Symptoms, Diagnosis \u0026amp; Treatment\nhttps://my.clevelandclinic.org/health/diseases/15060-hypospadias Mayo Clinic.\nHypospadias\nhttps://www.mayoclinic.org/diseases-conditions/hypospadias/symptoms-causes/syc-20355148 Boston Children’s Hospital.\nHypospadias\nhttps://www.childrenshospital.org/conditions/hypospadias National Institutes of Health (NIH) – MedlinePlus.\nHypospadias\nhttps://medlineplus.gov/ency/article/001285.htm Baskin LS, Ebbers MB.\nHypospadias: anatomy, etiology, and technique.\nJournal of Pediatric Surgery, 2006.\nhttps://pubmed.ncbi.nlm.nih.gov/16677877/ ","pubDate":"2025-10-15","title":"What is hypospadias?"},{"link":"https://bee-with-you.github.io/posts/pre-surgery_packing_list/","plain":" ⚠️ This log is a personal documentation and not medical advice. Always consult your child\u0026rsquo;s surgeon or pediatric urologist for individualized care.\nThis is a personal packing list for our infant/toddler’s hypospadias surgeries, including preparation for airplane travel and multi-day stays. We traveled to Texas for surgery with Dr. Snodgrass and Dr. Bush three times, when our son was between 7 and 22 months old. The following list is based on our experience and aims to help other families prepare for similar journeys.\nClothes Use cases: Sleep, Daywear, Flight wear, Hyperbaric wear, Spare clothes.\nItem Description Recommendation (⭑1–⭑3) Pure cotton body suit, tops and pants Comfortable for daywear and hyperbaric oxygen therapy (HBOT). Avoid metal decorations for HBOT. ⭑⭑⭑ Sleep bags/sack For safe sleep, easy to pack ⭑⭑⭑ Thick and lightweight blankets Useful for layering in different climates. ⭑⭑ Cotton socks Keep feet warm; avoid synthetic materials for HBOT. ⭑⭑⭑ Sun hats Prevent sunburn during travel and outdoor activities. ⭑⭑⭑ Thin clothes for Texas, thicker clothes for returning home Adapt to climate changes. ⭑⭑⭑ Food And Related Item Description Recommendation (⭑1–⭑3) Fresh cow milk Local purchase; bottled milk for travel. ⭑⭑⭑ Milk/water drinking cups Spill-proof and easy to clean. ⭑⭑⭑ Vitamin supplement Helps maintain nutrition after surgery. ⭑⭑ Bottled water Local purchase for general use. ⭑⭑⭑ Solid food prep tools Includes knife, blender, and steamer for preparing baby food. ⭑⭑ Food chopping board Easy to clean. ⭑⭑ Baby eating utensils Spoon, fork, plates, and bowls for feeding. ⭑⭑⭑ Pacifiers \u0026amp; clips Soothing during travel; bring extras. ⭑⭑ Bibs For easy cleanup during meals and travel. ⭑⭑⭑ Burp cloth/towel Multi-purpose for cleaning and feeding. ⭑⭑ Small towel for bathing Can cover waist to help block view of bandages. ⭑⭑ Water kettle For keeping water warm, cooking food, and preparing milk. ⭑⭑ General kitchen tools Includes pans, steamer, and peeler for food preparation. ⭑ Food scale/measuring cups Optional; for accuracy. ⭑ Baby food containers For freezer storage. ⭑⭑ Prune juice/puree Helps prevent constipation. ⭑⭑ Bottle/straw brushes For cleaning bottles and straws thoroughly. ⭑⭑⭑ Detergent for bottles/straws For cleaning feeding equipment. ⭑⭑⭑ Foldable basins For washing bibs and bottles while traveling. ⭑⭑ Other Daily Care Item Description Recommendation (⭑1–⭑3) Night light lamp (portable) Less disruptive for nighttime care and medication. ⭑⭑ Crib mattress For comfortable baby sleep. ⭑⭑ Absorbency underpad Makes diaper changes less messy when catheter is in and urine may drip continuously. ⭑⭑ Disposable gloves For hygiene during care tasks. ⭑⭑ Sterile gauze pads For protecting and cleaning around the catheter. ⭑⭑⭑ Thermometer For monitoring fever. ⭑ Nail clipper/scissors For daily nail care. ⭑⭑ Diaper For post-operative use. ⭑⭑⭑ Cloth/swim diaper Protects catheter during bathing. ⭑⭑ Diaper bag For organizing essentials during travel. ⭑⭑⭑ Waterwipes For gentle cleaning during diaper changes. ⭑⭑⭑ Bottle/pacifier wipes For quick cleaning of feeding items during travel. ⭑ Baby bath tub/rinser/towels Purchase locally for bathing needs. ⭑⭑ Bath toys Keep bathing fun and distract from catheter. ⭑⭑ Sponge towels For gentle sponge baths. ⭑⭑ Nasal aspirator For nasal cleaning. ⭑⭑ Saline water For nasal cleaning. ⭑⭑ Alcohol wipes For disinfecting surfaces and skin. ⭑⭑ Snoofybee Helps prevent accidental pulling of catheter during diaper changes. ⭑⭑ Tooth brush/flosser For daily oral hygiene. ⭑⭑ Baby shoes For travel and outings. ⭑⭑ Toys Item Description Recommendation (⭑1–⭑3) iPad/stand/charger Pre-download videos for travel and post-op distraction. ⭑⭑⭑ Silicone toys/cars Portable and safe for HBOT. ⭑⭑ Books of interest for baby Portable, for post-op entertainment. ⭑⭑ Toy cars/vehicles For play and distraction. ⭑⭑ Bath toys For fun during bath time. ⭑⭑ Screwdriver/Victorinox For installing batteries in toys. ⭑ Batteries for toys Bring extra batteries for toys. ⭑⭑ Sensory bins/Playdoh/Water Wow books For sensory play and distraction. ⭑⭑⭑ Surgery Related Medications Or Care Products Item Description Recommendation (⭑1–⭑3) Tylenol For pain relief after surgery. ⭑⭑⭑ Ibuprofen/Motrin For pain and inflammation relief. ⭑⭑⭑ Aquaphor Healing ointment for skin care. ⭑⭑⭑ AZO Standard Helps prevent urinary discomfort after catheter removal. ⭑⭑ Laxative (Pedia-Lax, Miralax) Helps prevent constipation. ⭑⭑ Manuka honey May help with skin reactions and healing. ⭑⭑ Trimethoprim sulfa or equivalent Prescribed antibiotic. ⭑⭑⭑ Water/medication dispenser For accurate dosing. ⭑⭑ Liquiband skin adhesive Optional; may help with fistula after catheter removal. ⭑⭑ UTI test strips Optional; for monitoring urinary tract health. ⭑ Travel Essentials and IDs Item Description Recommendation (⭑1–⭑3) ID documents For parents and child; required for travel. ⭑⭑⭑ Health insurance card For child; required for medical care. ⭑⭑⭑ Toys/books/tapes For entertainment during travel. ⭑⭑ iPad (pre-downloaded videos) For entertainment during travel. ⭑⭑⭑ Diaper bag (with essentials) For organizing and carrying essentials. ⭑⭑⭑ Car seat/bag For safe travel and transport. ⭑⭑⭑ Stroller For easy mobility during travel. ⭑⭑⭑ Cleaning/sanitizing wipes For cleaning and sanitizing. ⭑⭑⭑ Zip Loc Bags For storing dirty clothes and diapers during travel. ⭑⭑⭑ ","pubDate":"2025-08-20","title":"Packing List For Surgeries"},{"link":"https://bee-with-you.github.io/posts/pre-surgery_questions_to_doctors/","plain":"This post lists some suggested questions you can ask to help you find a doctor you\u0026rsquo;re most comfortable with for hypospadias treatment.\nQuestions on the Diagnosis What is the diagnosis? Please include the name, severity, curvature, location of the opening, foreskin condition, and any possible associated abnormalities. It is usually recommended to get at least one second opinion if the case is not minor, as it can help with making a more thoughtful decision. Are there any tests that need to be done? For example, some endocrine tests may be ordered during mini-puberty (i.e., around 1–6 months after birth) to gain insights into the boy\u0026rsquo;s testosterone levels without external stimulation. Occasionally, a heart echocardiogram may also be performed to ensure the structure and function of the heart are normal. Questions on the Doctors How many hypospadias surgeries do you perform each year and over the course of your career? How many cases of similar severity to ours do you handle annually? Based on your diagnosis, will the procedure be a single-stage or staged operation? What is the success rate for each stage of the operation? What are the possible short-term and long-term complications? Who will perform the operation, and what are the responsibilities of each person involved? Will it be a single surgeon with an assistant, or multiple surgeons? Who can we contact before and after the operation for questions or in case of emergency, and how? What is your technique for correcting the curvature/chordee? Is it dorsal plication or ventral lengthening? What technique do you use to reconstruct the new urethra? For example, do you use the urethral plate, a skin flap, or a skin graft? Questions on the Surgery When is the proper time for us to do surgery for our specific case? How long will the catheter remain in place, and who can remove it? What will post-operative care involve? Is it recommended to undergo HBOT (Hyperbaric Oxygen Therapy) before and after the surgery? Other Questions How long should we wait before traveling? What activities can and can\u0026rsquo;t be done, and for how long? Extended Reading Minipuberty of human infancy ","pubDate":"2025-06-17","title":"Pre-Surgery Questions To Doctors"},{"link":"https://bee-with-you.github.io/posts/postop-care-stage-three-experience/","plain":" ⚠️ This log is a personal documentation and not medical advice. Always consult your child\u0026rsquo;s surgeon or pediatric urologist for individualized care.\nBackground Procedure: Stage 3 STAC repair for tubularization\nSurgeons: Dr. Warren Snodgrass \u0026amp; Dr. Nicol Bush\nPatient Age: 21 months\nLocation: Hypospadias Specialty Center Recovery Log Week 1 (Day 1–7) Day Summary Day 1 Surgery completed. Skipped HBOT due to fuzziness. Red bandage noticed during first diaper change after surgery. Day 2 Two HBOT sessions. No bowel movement. Added Miralax. Started wrapping catheter tip in sterile gauze to avoid poop soiling. Day 3 Two HBOT sessions. Mild fever and flushed face. Pooped 4 times with gas. Energy level improved. Day 4 One HBOT session. Fever continued. Bandage bottom began peeling off. Continued poor sleep quality. Day 5 Fever persisted. Tylenol more effective than Motrin. Day 6 Sleep quality significantly improved. Red flushed face persisted. Pooped 3–4 times since Day 3. Bandage loose on bottom and sides. Week 2 (Day 8–14) Day Summary Day 8–11 Bandages continued to loosen. Baby stayed hydrated; mood and sleep stable. Day 12-14 First bath postponed until now due to the use of the steri-strips. All bandages washed off in water except a small sticky part at the top, which required a manual pull while baby was crying hard. Baby was terrified and refused to bathe afterward. Started applying Aquaphor as the surgical site was exposed. Tough day. Week 3–4 Summary (Day 15–28) Catheter removed successfully on Day 15. Baby cried a lot when peeing until Day 20, especially when peeing right after waking up. Bathing resumed; Aquaphor application continued. Healing progressing as expected. Week 5–6 Summary (Day 29–42) Continued applying Aquaphor after each diaper change for 6 weeks. No steroid cream was needed, as instructed by the doctor. Started using some kid-safe silicone gels or plant-based ingredients to help fade surgical scars. Notes Steri-strips may be used in the final stage surgery and ideally should stay on for 10+ days. Expect some bandage bleeding during the first 24–48 hours. Stay consistent with pain medication, especially in the first 48 hours post-op and before bathing with catheter in place. Swim diapers may help prevent accidental pulling of the catheter. Keep baby well hydrated, dehydration causes constipation, which can increase bladder spasms. ","pubDate":"2025-06-17","title":"Stage 3 Hypospadias Repair - Post-Op Recovery Log"},{"link":"https://bee-with-you.github.io/posts/postop-care-stage-two-experience/","plain":" ⚠️ This log is a personal documentation and not medical advice. Always consult your child\u0026rsquo;s surgeon or pediatric urologist for individualized care.\nBackground Procedure: Stage 2 STAC repair using preputial graft\nSurgeons: Dr. Warren Snodgrass \u0026amp; Dr. Nicol Bush\nPatient Age: 14 months\nLocation: Hypospadias Specialty Center Recovery Log Week 1 (Day 1–7) Day Summary Day 0 Surgery completed. Top-left corner of outer bandage turned red. First HBOT session. Day 1 Bandage edge lifted and turned light red. Vomiting noted. Day 2 Diarrhea. Bandage soiled by stool. Poor sleep quality. Day 3 Continued diarrhea. Gently wrapped catheter tip in sterile gauze to prevent further soiling. Day 4 Flushed face (likely from bladder spasm medication). Appetite improved. Baby became more active. Day 5 First bath. Baby frightened by the bandages, used a floating towel to block the view. Day 6 Bandage partially detached. One of the three blue stitches securing the rolled bandage on graft came off. Difficult day. Week 2 (Day 8–14) Day Summary Day 7 Catheter removed. No bleeding. Baby slept better. Day 8 Applied Manuka honey; mild skin reaction. Appetite low. Day 9 Swelling reduced. Baby distressed during diaper changes. Day 10 Calm. Napped for 3 hours. Honey tolerated well. Day 11 Small scab (~2mm) observed. Motrin no longer needed. Day 12 Final HBOT session. Baby tired and clingy; took long nap. Day 13 Returned home. Baby happy and regained energy. Week 3 Summary (Day 15–21) Applied Aquaphor generously. Week 4–6 Summary (Day 22–43) Sutures mostly dissolved. Began applying steroid cream. Redness and swelling gradually improved. Hard spot near scrotum noticed. Week 7–9 Summary (Day 44–64) Skin softening observed. Graft integrating well. Week 10+ Summary (Day 65–Week 23) Minimal scarring according to the doctor. Occasional redness around graft edges. Medication \u0026amp; Wound Care Item Description Hycet Pain relief during the first few days Motrin Used for 7+ days post-op Bladder spasm meds Used while catheter was in place Antibiotics Prescribed post-op Aquaphor Keeps skin moist, supports suture absorption Manuka Honey Used for skin reaction Steroid Cream Begin ~1 month post-op; apply 2x/day for 3 months Bathing Warm water soak, 2x/day Notes Pay attention to the catheter to ensure it stays straight and free from kinks Pay attention on the baby bowel movement so it can get cleaned ASAP ","pubDate":"2025-06-16","title":"Stage 2 Hypospadias Repair - Post-Op Recovery Log"},{"link":"https://bee-with-you.github.io/posts/postop-care-stage-one-experience/","plain":" ⚠️ This log is a personal documentation and not medical advice. Always consult your child\u0026rsquo;s surgeon or pediatric urologist for individualized care.\nBackground Procedure: Stage 1 STAC (STraighten And Close) hypospadias repair Surgeons: Dr. Warren Snodgrass \u0026amp; Dr. Nicol Bush\nPatient Age: 7 months Location: Hypospadias Specialty Center Recovery Log Week 1 (Day 1–7) Day Description Day 0 Added a tiny amount of Miralax to milk (need to test if the infant is tolerant about it beforehand) and avoid hard-to-digest solid food to prevent constipation. Day 1 Baby appeared pale and dull post-surgery. Started HBOT. Baby cried hard during HBOT and played briefly in the evening. Day 2 Continued Miralax and meds. Prepared 100% cotton clothes for HBOT. Baby calm and happy. Day 3 Baby kicked a lot during HBOT, some blood observed, tegaderm partially peeled. Nurse confirmed mild oozing is expected. Penis base was visible and appeared dark red/black. Day 4 Nurse checked and confirmed appearance was normal. Learned to wrap catheter tip with sterile gauze pad to prevent loose poop entering catheter. Day 5 First bath. All bandages off. Penis looked red, bruised, and swollen with scabbed skin. Applied Manuka honey as instructed. Day 6 Bathed baby 3 times. Continued Manuka honey. Penis swelling slightly reduced. Switched honey with MGO 850+ once it arrived. Day 7 Yellow discharge and scabs noted. Underside more visible with less swellingness. Week 2 (Day 8–14) Day Description Day 8 Catheter removed smoothly. Used toy distraction and pain management during and before catheter removal. Day 9 Quick check with doctor; healing normal. Continue honey until underside heals. Day 10–11 Baby became more active. Easier diaper change post catheter removal. Day 12 Noticed cleft-like underside wound (turned out due to swellingness). Doctor advised continuing honey. Day 13-14 Introduced more solid food for better nutrition. Used suppository after 3 days of no poop. Week 3–4 Summary (Day 15–28) Continued observation of underside healing and scabbing. Returned home (Day 15) and resumed regular care routines. Daily honey application continued; rash observed likely due to travel and diet. Scrotal skin redness improving. Rashes emerged on topside of penis, possibly from long-time use of honey. Week 5–6 Summary (Day 29–42) Honey frequency reduced due to suspected rash irritation. Scabs completely gone. Started topical steroid (betamethasone) on Day 45 but baby was upset with the irritation for the first few mins. Week 7–9 Summary (Day 43–63) Continued steroid cream and moisturizing with Aquaphor/Vaseline when not using the cream. Gradual resolution of hard/swollen areas. Suture remnants observed and eventually fell off. Skin still tender and slightly red but improving steadily. Week 10+ Summary (Day 64–Week 23) Steroid stopped at Week 20 (used ~48g over 3 months). Noticed temporary increased redness after stopping steroids, then improvement. Observed visible blood vessels and a small residual lump near penoscrotal area. Skin condition improving, with less hardening. Notes ⚠️ For any unusual symptoms or concerns, consult your surgeon immediately.\nBaby experienced both diarrhea and constipation post stage one surgery, and it may be better to get prepared for both. ","pubDate":"2025-06-16","title":"Stage 1 Hypospadias Repair - Post-Op Recovery Log"},{"link":"https://bee-with-you.github.io/posts/post-surgery_complications_others/","plain":"This post introduces additional post-surgery complications beyond those already discussed: fistula and glans dehiscence .\nWhat Are Other Possible Complications? Other potential complications after hypospadias repair include:\nPersistent penile curvature: the penis bends again after surgical correction Urethral stricture: narrowing of the urethra along the repaired segment Meatal stenosis: narrowing of the urethral opening Urethral diverticulum: bulging or outpouching of the urethra after repair Skin-related issues: Skin loss, contraction, or scarring Penile skin redundancy Penile concealment (the penis appears sunken and hidden) Suture sinuses (scar tissue associated with surgical sutures) Erectile dysfunction Infections: skin infections or urinary tract infections (UTIs) Abnormal uroflow: an obstructed urine flow pattern with intermittent or plateau curve (referemce ) Extended Reading These complications are generally less common than fistula and glans dehiscence. The following resources provide additional information. Dedicated posts on each topic may be added later:\nComplications introduction from Operation Happenis Complications and reoperations from Hypospadias Specialty Center Risks and benefits from Cleveland Clinic ","pubDate":"2025-06-16","title":"Surgery Complications: Others"},{"link":"https://bee-with-you.github.io/posts/post-surgery_complications_glans_dehiscence/","plain":"This post briefly introduces one of the common post-surgery complications, glans dehiscence.\nWhat Is Glans Dehiscence (GD)? Glans dehiscence is a known complication after hypospadias surgery, where the stitched head of the penis (glans) partially or completely comes apart. During surgery, the glans is closed around a newly created urine channel. If the closure doesn\u0026rsquo;t stay intact, the opening may shift back to a lower position. Pictures of GD are shown below.\nWhat Are The Risk Factors? Several factors can increase the chance of glans dehiscence:\nLocation of the original urethral opening: If the opening is further down the shaft (proximal hypospadias) instead of near the tip (distal), the surgery is more complex, and the risk of the glans coming apart is higher. Redo surgery: If this is not the first surgery, the risk goes up. This is likely because the tissues are already scarred or not as healthy, making healing harder. Other factors mentioned in the research papers include glans width, urethral plate width, surgery before 6 months old or post-puberty, and so on. How Common Is It? The occurrence rate varies by study, but glans dehiscence happens in about 5% to 20% of cases. It\u0026rsquo;s one of the most common reasons children need a second surgery after hypospadias repair.\nWhen Does It Occur? Glans dehiscence usually becomes noticeable within a few weeks to a few months after surgery, often during follow-up visits or as the child grows.\nDoes It Always Need Treatment? Not always.\nGD doesn’t always cause problems and might even improve urinary flow, so watchful waiting can be a valid option. Regular long-term follow-up is recommended, especially into puberty. Consider repair if the child experiences urinary problems (like a poor stream) or is upset about how it looks. It is important to be evaluated by at least one surgeon to make informative decision on the treatment. References Glans dehiscence after severe hypospadias repair. Is it a real complication? Clues from a study in post-pubertal patients Glans dehiscence pictures examples source 1 Glans dehiscence pictures examples source 2 Risk factors of glans dehiscence by Snodgrass and Bush Risk factors of glans dehiscence by Karabulut and Sonmez Treatment decision from the paper on Salvaging the dehisced glans penis ","pubDate":"2025-06-05","title":"Surgery Complications: Glans Dihescence"},{"link":"https://bee-with-you.github.io/posts/post-surgery_complications_fistula/","plain":"This post briefly introduces one of the common post-surgery complications, fistula.\nWhat Is a Fistula? A fistula is a small hole that forms below the normal urinary opening after hypospadias surgery. It causes urine to leak from an abnormal site when the boy pees. They are one of the most common complications following hypospadias repair, and the complicate rate can vary from 4% to 25% or above depending on the surgical techniques, the hypospadias severity, the operation history, the healing status and so on.\nHere is an example picture of a fistula:\nWhen Does It Occur? Most fistulas appear within weeks to months after surgery. Rarely, they may show up years later. Early signs include urine leakage from an unintended spot after catheter removal. Common Locations Fistulas may develop anywhere below the normal opening, and many just appear just under the glans (penis head).\nAre There Other Accompanying Complications? While many boys with fistulas have no other complications, some may also develop:\nPersistent curvature (chordee) Urethral blockage beyond the fistula hole Ballooning of the new urethra during urination These should be evaluated by your surgeon.\nTreatment Simple Fistulas If tissue around the glans is well-healed: Closure can often be done without a full redo surgery No catheter may be needed \u0026gt;90% success rate Complex Fistulas If there are additional issues (e.g. curvature, scarring, poor healing): A redo hypospadias repair is required May involve catheter use and/or skin grafting Follow-Up Always schedule follow-up visits after surgery. If a fistula or any abnormal urination is noticed, contact your urologist promptly.\nReferences Operation Happenis CHOP - Hypospadias Overview Fistula Picture Example 1 FIstula Picture Example 2 Fistula Complication Rate Fistula Risk Factors ","pubDate":"2025-05-14","title":"Surgery Complications: Fistula"},{"link":"https://bee-with-you.github.io/posts/postop-care-scars/","plain":"Many parents worry about scarring after surgery. This post explores non-invasive ways to minimize scar tissue following hypospadias surgery. Always follow your doctor’s advice regarding post-op scar care.\nMethods to Reduce Scars Post-Surgery Following your physician’s instructions is crucial for effective scar prevention. While many patients heal naturally without intervention, some may require consistent treatment for months to see improvement. Possible methods include:\nHyperbaric Oxygen Therapy (HBOT) HBOT involves breathing 100% oxygen in a pressurized chamber (1.5–3 times normal air pressure) to treat oxygen-deprived tissues (e.g., the tissues near the surgical site). It boosts oxygen levels in the blood, promoting healing and potentially reducing scarring. HBOT may be used before and after surgery to support faster recovery.\nSteroid Cream Steroid creams are widely used for pathological scar prevention and treatment. They reduce collagen production and inflammation, helping to minimize scar volume and alleviate itching and discomfort. The following picture is an example of steroid cream we were prescribed and instructed to use since about one month post surgery.\nScar Creams Scar creams aid skin regeneration, promoting smoother healing. Their effectiveness varies by ingredients:\nSilicone Gel: Creates a controlled environment that prevents excessive collagen buildup, reducing keloid formation. Plant-Based Ingredients: Ingredients like allantoin and onion extract hydrate the skin, soften scar tissue, and support regrowth. For recommended scar creams, refer to:\nThe 8 Best Scar Creams to Fade Unwanted Scars The Best Scar Creams and Treatments, According to Dermatologists Additionally, regular scar massage and moisturization can help improve flexibility and appearance.\nTypes of Scars Understanding your scar type helps determine the best treatment approach. The two main difficult-to-heal scars are:\nHypertrophic Scars Appear as red, raised, thick scars within the original wound boundary. Result from damage to the deeper skin layer (dermis). Usually improve naturally over 1 to 2 years. Keloid Scars Extend beyond the original wound area. Can become elevated, shiny, firm, and change color over time. Less likely to resolve completely without treatment. Wound Healing and Scar Formation Phases Initial Inflammatory Phase (0 to 5 days) Blood vessels constrict to form a clot, stopping bleeding. They then expand to deliver nutrients, white blood cells, and antibodies to the wound, aiding infection prevention and repair. Proliferation Phase (4 days to 3 weeks) The body rebuilds skin using collagen-rich tissue. New skin forms, and the wound’s appearance reflects healing progress. Proper wound care is essential for optimal recovery. Maturation or Remodeling Phase (3 weeks to 18+ months) Scar tissue gradually softens, flattens, and becomes less visible. Excess collagen is broken down and reorganized. The process may take up to two years, depending on individual healing factors. Healing is not always linear; wounds may fluctuate between the proliferation and remodeling phases. Ideally, healing progresses from deeper layers to the surface. Regular scar massage and moisturization can help enhance flexibility and reduce visibility over time.\nReference HBOT introduction Hyperbaric oxygen therapy improves the effect of keloid surgery and radiotherapy by reducing the recurrence rate Top Treatments and Natural Options for Scar Removal Understanding scars and effective care The Differences Between Keloid \u0026amp; Hypertrophic Scars The application of corticosteroids for pathological scar prevention and treatment current review and update ","pubDate":"2025-02-10","title":"Minimizing Scarring After Hypospadias Surgery"},{"link":"https://bee-with-you.github.io/posts/resources/","plain":"This post collects the resources and support that are related to hypospadias.\nGetting To Know About Hypospadias Hypospadias and epispadias association Operation happenis PISSED: Parents Improving Support, Surgery, Education, and Diligence with Hypospadias Support Groups Facebook support groups One needs to search the following keyworkds in Facebook to find them, and choose to join the interested ones.\nHypospadias Parent Support Group (Pro-surgery and Pro-choice)\nHypospadias and Epispadias Association (HEA)\nHypospadias \u0026amp; Penile Birth Defect Support\nHypospadias Surgery Support\nReal Support \u0026amp; Education for People with Hypospadias/Epispadias/Chordee\nDr. Snodgrass/Dr. Bush Hypospadias Support Group\nReddit Support Groups One can search the keyword of interest to find related groups to join, and the following one is so far the most related group.\nr/hypospadias Books And Research Papers How Down There Bear Got Repaired by Deb Smith, 2024\nNo Margin for Error: A Surgeon\u0026rsquo;s Struggle Repairing Hypospadias by Dr. Warren Snodgrass, 2023\nLiving with hypospadias by John Filippelli, 2021\nHypospadias: A guide to treatment: The definitive guide for parents with boys born with hypospadis by Matt Dorow, Dr. Suzan Carmichael, and Dr. Bill Kennedy, 2013\n","pubDate":"2024-07-28","title":"Hypospadias Resources Collection"}];
